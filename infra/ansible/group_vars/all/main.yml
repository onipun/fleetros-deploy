---
# Shared variables for both local and prod.
fleetros_namespaces:
  - argocd
  - infra
  - app
  - data
  - monitoring
  - stackgres

# Argo CD
argocd_chart_version: "7.7.7"
argocd_namespace: argocd
# Local NodePort for the Argo CD UI. Reachable from the host at
# http://<vm-ip>:<argocd_nodeport>. Argo is installed with server.insecure=true
# (plain HTTP on 8080) so we expose the http port, not https. Must be 30000-32767.
argocd_nodeport: 30080

# Argo CD Image Updater
argocd_image_updater_chart_version: "0.11.0"

# cert-manager
cert_manager_chart_version: "v1.16.1"
cert_manager_namespace: infra

# StackGres (PostgreSQL operator + monitoring stack + Web UI)
stackgres_chart_version: "1.16.0"
stackgres_namespace: stackgres
# NodePort for the StackGres Web UI when port-forwarding/NodePort fallback is
# wanted. Normal access goes through the Ingress at https://stackgres.<domain>.
stackgres_ui_nodeport: 30081

# Observability stack — kube-prometheus-stack (Prometheus + Grafana +
# Prometheus Operator) plus Loki for logs and Promtail for log shipping.
# All retention is capped at 72h per the operator brief ("log just need to
# stay 3 DAYS and replaced with the new one"); same window is applied to
# Prometheus TSDB so metric/log timelines stay aligned in Grafana.
monitoring_namespace: monitoring
kube_prometheus_stack_chart_version: "65.5.1"
loki_chart_version: "6.16.0"
promtail_chart_version: "6.16.6"
monitoring_retention: "72h"
grafana_admin_user: "admin"
# Local-only default; production overrides via group_vars/prod/vault.yml.
grafana_admin_password: "fleetros-local"

# Gitops repo (where Argo CD pulls from). Override per-env in inventory if you split repos later.
gitops_repo_url: "https://github.com/YOUR_ORG/fleetros-deploy.git"
gitops_repo_revision: "HEAD"
gitops_repo_path_charts: "gitops/charts/fleetros"

# K3s
k3s_version: "v1.31.4+k3s1"
k3s_kubeconfig_local_path: "{{ lookup('env', 'HOME') }}/.kube/fleetros-{{ fleetros_env }}"
