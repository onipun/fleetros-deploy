---
# common: minimal OS hardening + prerequisites for K3s
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - jq
      - vim
      - htop
      - unattended-upgrades
      - fail2ban
    state: present

- name: Disable swap (K8s requirement)
  ansible.builtin.shell: |
    swapoff -a
    sed -i '/ swap / s/^/#/' /etc/fstab
  args:
    executable: /bin/bash
  changed_when: false

- name: Detect host architecture for k9s download
  ansible.builtin.set_fact:
    k9s_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"

- name: Install k9s (cluster TUI for debugging)
  ansible.builtin.shell: |
    set -euo pipefail
    K9S_VERSION="{{ k9s_version | default('v0.32.7') }}"
    cd /tmp
    curl -fsSL "https://github.com/derailed/k9s/releases/download/${K9S_VERSION}/k9s_Linux_{{ k9s_arch }}.tar.gz" \
      | tar -xz k9s
    install -m 0755 /tmp/k9s /usr/local/bin/k9s
    rm -f /tmp/k9s
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k9s

- name: Configure UFW (prod only — local VM left open for multipass mDNS)
  when: fleetros_env == "prod"
  block:
    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
    - name: Allow K8s API (restrict in prod via firewall.tf to admin IP)
      community.general.ufw:
        rule: allow
        port: "6443"
    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny
