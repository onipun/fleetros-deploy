---
# common: minimal OS hardening + prerequisites for K3s
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - jq
      - vim
      - htop
      - unattended-upgrades
      - fail2ban
    state: present

- name: Disable swap (K8s requirement)
  ansible.builtin.shell: |
    swapoff -a
    sed -i '/ swap / s/^/#/' /etc/fstab
  args:
    executable: /bin/bash
  changed_when: false

- name: Configure UFW (prod only — local VM left open for multipass mDNS)
  when: fleetros_env == "prod"
  block:
    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
    - name: Allow K8s API (restrict in prod via firewall.tf to admin IP)
      community.general.ufw:
        rule: allow
        port: "6443"
    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny
