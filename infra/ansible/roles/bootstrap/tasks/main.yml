---
# bootstrap: install Helm, create namespaces, install cert-manager + Argo CD,
# seed K8s Secrets from Ansible Vault.
- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Create namespaces
  ansible.builtin.shell: |
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop: "{{ fleetros_namespaces }}"
  changed_when: false

- name: Add Helm repos
  ansible.builtin.shell: |
    helm repo add jetstack https://charts.jetstack.io
    helm repo add argo https://argoproj.github.io/argo-helm
    helm repo add stackgres-charts https://stackgres.io/downloads/stackgres-k8s/stackgres/helm/
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    helm repo add grafana https://grafana.github.io/helm-charts
    helm repo update
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Install cert-manager
  ansible.builtin.shell: |
    helm upgrade --install cert-manager jetstack/cert-manager \
      --namespace {{ cert_manager_namespace }} \
      --version {{ cert_manager_chart_version }} \
      --set installCRDs=true \
      --wait --timeout 5m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# ---------------------------------------------------------------------------
# Local-only: import the mkcert root CA (from the developer's host machine)
# into the cluster as a TLS Secret so cert-manager can sign per-host certs
# from a CA the browser already trusts.
#
# Requires `mkcert` on the host AND `mkcert -install` to have been run once
# (so the CA is in the OS/browser trust store).
# ---------------------------------------------------------------------------
- name: Locate mkcert CAROOT on the operator's host
  ansible.builtin.command: mkcert -CAROOT
  register: mkcert_caroot
  delegate_to: localhost
  become: false
  changed_when: false
  when: fleetros_env == "local"

- name: Slurp mkcert root CA cert from host
  ansible.builtin.slurp:
    src: "{{ mkcert_caroot.stdout }}/rootCA.pem"
  register: mkcert_ca_cert
  delegate_to: localhost
  become: false
  when: fleetros_env == "local"

- name: Slurp mkcert root CA key from host
  ansible.builtin.slurp:
    src: "{{ mkcert_caroot.stdout }}/rootCA-key.pem"
  register: mkcert_ca_key
  delegate_to: localhost
  become: false
  when: fleetros_env == "local"

- name: Render mkcert-ca Secret
  ansible.builtin.copy:
    dest: /tmp/mkcert-ca-secret.yaml
    mode: "0600"
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: mkcert-ca
        namespace: {{ cert_manager_namespace }}
      type: kubernetes.io/tls
      data:
        tls.crt: {{ mkcert_ca_cert.content }}
        tls.key: {{ mkcert_ca_key.content }}
  when: fleetros_env == "local"

- name: Apply mkcert-ca Secret
  ansible.builtin.shell: kubectl apply -f /tmp/mkcert-ca-secret.yaml
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: fleetros_env == "local"
  changed_when: false

- name: Remove rendered mkcert-ca file
  ansible.builtin.file:
    path: /tmp/mkcert-ca-secret.yaml
    state: absent

- name: Apply self-signed ClusterIssuer (local) or LE issuer template (prod)
  ansible.builtin.template:
    src: "{{ item }}.yaml.j2"
    dest: "/tmp/{{ item }}.yaml"
  loop:
    - cluster-issuer
  register: issuer_files

# ---------------------------------------------------------------------------
# Prod-only: seed the DNS provider Secret cert-manager uses for ACME DNS-01.
# Required so Let's Encrypt can issue wildcard certs for `*.portal.<domain>`.
# Values come from group_vars/prod/vault.yml (ansible-vault encrypted).
# ---------------------------------------------------------------------------
- name: Seed Cloudflare API token Secret (prod, dns01 solver)
  ansible.builtin.shell: |
    kubectl -n {{ cert_manager_namespace }} create secret generic {{ acme_dns_secret_name }} \
      --from-literal=api-token='{{ vault_cloudflare_api_token }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - fleetros_env == "prod"
    - acme_dns_provider == "cloudflare"
  no_log: true
  changed_when: false

- name: Seed Route53 credentials Secret (prod, dns01 solver)
  ansible.builtin.shell: |
    kubectl -n {{ cert_manager_namespace }} create secret generic {{ acme_dns_secret_name }} \
      --from-literal=access-key-id='{{ vault_aws_access_key_id }}' \
      --from-literal=secret-access-key='{{ vault_aws_secret_access_key }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - fleetros_env == "prod"
    - acme_dns_provider == "route53"
  no_log: true
  changed_when: false

- name: Seed Google Cloud DNS service account Secret (prod, dns01 solver)
  ansible.builtin.shell: |
    kubectl -n {{ cert_manager_namespace }} create secret generic {{ acme_dns_secret_name }} \
      --from-literal=key.json='{{ vault_gcp_clouddns_sa_json }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - fleetros_env == "prod"
    - acme_dns_provider == "clouddns"
  no_log: true
  changed_when: false

- name: kubectl apply ClusterIssuer
  ansible.builtin.shell: kubectl apply -f /tmp/cluster-issuer.yaml
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Install Argo CD
  ansible.builtin.shell: |
    helm upgrade --install argocd argo/argo-cd \
      --namespace {{ argocd_namespace }} \
      --version {{ argocd_chart_version }} \
      --set configs.params."server\.insecure"=true \
      --set server.service.type=NodePort \
      --set server.service.nodePortHttp={{ argocd_nodeport }} \
      --wait --timeout 10m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install Argo CD Image Updater
  ansible.builtin.shell: |
    helm upgrade --install argocd-image-updater argo/argocd-image-updater \
      --namespace {{ argocd_namespace }} \
      --version {{ argocd_image_updater_chart_version }} \
      --wait --timeout 5m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# ---------------------------------------------------------------------------
# StackGres: PostgreSQL operator. Bundles Patroni HA, pgBouncer, Prometheus
# exporters and a Grafana dashboard out of the box, plus a Web UI.
#
# The operator must exist BEFORE Argo CD applies the umbrella chart, because
# the chart ships SGCluster / SGScript custom resources that the operator's
# CRDs must already be registered for.
#
# Notes on previous failures:
#   1. `--set adminui.service.exposeHTTP.enabled=true` triggered a Helm
#      coalesce warning ("destination is a table. Ignoring non-table value")
#      because the chart's default for that key collides with a subchart
#      override. We do NOT need an extra HTTP port — Traefik can talk HTTPS
#      to the default `stackgres-restapi:443` Service via a backend-scheme
#      annotation on the Ingress.
#   2. The chart's pre-install hook Job `stackgres-operator-install-sgconfig`
#      hits `BackoffLimitExceeded` on slow K3s VMs because the operator's
#      webhook pod isn't Ready by the time the Job's retry budget runs out.
#      The `--timeout 15m` plus `--wait-for-jobs` gives the webhook enough
#      head-start; on failure we dump the Job's pod logs so the next run
#      isn't a guessing game.
# ---------------------------------------------------------------------------
- name: Pre-create StackGres namespace (so the chart's pre-install Job has somewhere to run)
  ansible.builtin.shell: |
    kubectl create namespace {{ stackgres_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Clean up a previous failed StackGres install (pending-install / failed Helm release)
  ansible.builtin.shell: |
    set +e
    STATUS=$(helm status stackgres-operator -n {{ stackgres_namespace }} -o json 2>/dev/null | sed -n 's/.*"status": *"\([^"]*\)".*/\1/p' | head -n1)
    case "$STATUS" in
      pending-install|pending-upgrade|pending-rollback|failed)
        echo "Existing release in '$STATUS' state — uninstalling before retry."
        helm uninstall stackgres-operator -n {{ stackgres_namespace }} --wait || true
        # Some pre-install Jobs survive `helm uninstall`. Delete them by hand.
        kubectl -n {{ stackgres_namespace }} delete jobs -l app=stackgres-operator --ignore-not-found
        kubectl -n {{ stackgres_namespace }} delete jobs --field-selector=status.successful!=1 --ignore-not-found
        ;;
      *)
        echo "No prior failed release (status='$STATUS')."
        ;;
    esac
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Install StackGres operator
  ansible.builtin.shell: |
    helm upgrade --install stackgres-operator stackgres-charts/stackgres-operator \
      --namespace {{ stackgres_namespace }} \
      --version {{ stackgres_chart_version }} \
      --wait --wait-for-jobs --timeout 15m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: stackgres_install
  failed_when: false

- name: Dump StackGres install diagnostics on failure
  ansible.builtin.shell: |
    set +e
    echo "=== helm status ==="
    helm status stackgres-operator -n {{ stackgres_namespace }} || true
    echo "=== pods ==="
    kubectl -n {{ stackgres_namespace }} get pods -o wide || true
    echo "=== jobs ==="
    kubectl -n {{ stackgres_namespace }} get jobs || true
    echo "=== events (last 50) ==="
    kubectl -n {{ stackgres_namespace }} get events --sort-by=.lastTimestamp | tail -n 50 || true
    for j in $(kubectl -n {{ stackgres_namespace }} get jobs -o name 2>/dev/null); do
      echo "=== $j logs ==="
      kubectl -n {{ stackgres_namespace }} logs $j --tail=200 --all-containers=true || true
    done
    for p in $(kubectl -n {{ stackgres_namespace }} get pods -o name 2>/dev/null); do
      echo "=== $p describe (events tail) ==="
      kubectl -n {{ stackgres_namespace }} describe $p | tail -n 30 || true
    done
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: stackgres_install.rc is defined and stackgres_install.rc != 0
  changed_when: false

- name: Fail loudly if StackGres install failed
  ansible.builtin.fail:
    msg: |
      StackGres operator install failed (rc={{ stackgres_install.rc }}).
      stderr: {{ stackgres_install.stderr | default('') }}
      See the diagnostic dump above for the failing pod / job logs.
  when: stackgres_install.rc is defined and stackgres_install.rc != 0


- name: Render and apply seeded Secrets
  ansible.builtin.template:
    src: secrets.yaml.j2
    dest: /tmp/fleetros-secrets.yaml
    mode: "0600"

- name: kubectl apply seeded Secrets
  ansible.builtin.shell: kubectl apply -f /tmp/fleetros-secrets.yaml
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Remove rendered secrets file
  ansible.builtin.file:
    path: /tmp/fleetros-secrets.yaml
    state: absent

# ---------------------------------------------------------------------------
# Observability stack (Prometheus + Grafana + Loki + Promtail).
#
# Installed by Ansible — NOT through the umbrella Argo CD app — for the
# same reason StackGres is installed here: the umbrella chart ships
# `ServiceMonitor`, `PrometheusRule` and grafana-dashboard ConfigMaps that
# need the Prometheus Operator CRDs to exist first. Argo CD would
# otherwise loop on a "no matches for kind ServiceMonitor" error.
#
# Retention: metrics + logs are both capped at 72h (3 days). Anything
# older is automatically dropped — Prometheus by TSDB retention,
# Loki by the compactor's retention_period.
# ---------------------------------------------------------------------------
- name: Render kube-prometheus-stack values
  ansible.builtin.copy:
    dest: /tmp/kube-prometheus-stack-values.yaml
    mode: "0600"
    content: |
      crds:
        enabled: true
      alertmanager:
        enabled: false
      prometheusOperator:
        admissionWebhooks:
          # K3s' bundled admission webhook flow is fragile on first boot;
          # patch via a Job rather than failing the install if the webhook
          # is briefly unavailable.
          patch:
            enabled: true
      prometheus:
        prometheusSpec:
          retention: {{ monitoring_retention }}
          # Lets Prometheus pick up ServiceMonitors / PodMonitors from any
          # namespace (umbrella chart drops them into `app`, `data`, etc.).
          serviceMonitorSelectorNilUsesHelmValues: false
          podMonitorSelectorNilUsesHelmValues: false
          ruleSelectorNilUsesHelmValues: false
          probeSelectorNilUsesHelmValues: false
          # Local single-node cluster — keep the disk footprint modest.
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: local-path
                resources:
                  requests:
                    storage: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 400Mi
            limits:
              cpu: "1"
              memory: 1500Mi
      grafana:
        adminUser: {{ grafana_admin_user }}
        adminPassword: {{ grafana_admin_password }}
        defaultDashboardsTimezone: browser
        # The sidecar auto-discovers ConfigMaps labelled `grafana_dashboard=1`
        # in ANY namespace; that's how the umbrella chart ships the
        # Fleetros-specific dashboards (Traefik / Postgres slow queries).
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
            folderAnnotation: grafana_folder
            provider:
              foldersFromFilesStructure: true
          datasources:
            enabled: true
            label: grafana_datasource
            labelValue: "1"
            searchNamespace: ALL
        # Loki is provisioned as an extra datasource so the same Grafana
        # explorer can pivot between metrics (Prometheus) and logs (Loki).
        additionalDataSources:
          - name: Loki
            type: loki
            uid: loki
            access: proxy
            url: http://loki-gateway.{{ monitoring_namespace }}.svc.cluster.local
            jsonData:
              maxLines: 1000
        service:
          type: ClusterIP
        # Ingress comes from the umbrella chart (Traefik + cert-manager),
        # keeping all *.fleetros.local hosts in one place.
        ingress:
          enabled: false
        persistence:
          enabled: true
          storageClassName: local-path
          size: 2Gi
      kubeApiServer:
        enabled: true
      kubelet:
        enabled: true
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeProxy:
        enabled: false
      kubeEtcd:
        enabled: false
      defaultRules:
        create: true

- name: Install kube-prometheus-stack
  ansible.builtin.shell: |
    helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
      --namespace {{ monitoring_namespace }} \
      --version {{ kube_prometheus_stack_chart_version }} \
      -f /tmp/kube-prometheus-stack-values.yaml \
      --wait --timeout 15m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Render Loki values (single-binary, 72h retention)
  ansible.builtin.copy:
    dest: /tmp/loki-values.yaml
    mode: "0600"
    content: |
      deploymentMode: SingleBinary
      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        # File-system storage — local single-node cluster doesn't need
        # MinIO/S3. Keeps the footprint to a single PVC.
        storage:
          type: filesystem
        schemaConfig:
          configs:
            - from: "2024-01-01"
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: index_
                period: 24h
        # 72h retention enforced by the compactor. After 3 days chunks +
        # index entries are deleted.
        limits_config:
          retention_period: {{ monitoring_retention }}
          reject_old_samples: true
          reject_old_samples_max_age: 168h
        compactor:
          retention_enabled: true
          delete_request_store: filesystem
        pattern_ingester:
          enabled: false
        rulerConfig:
          enable_api: false
        # SingleBinary mode disables the per-tenant table-manager;
        # retention is purely compactor-driven (above).
      singleBinary:
        replicas: 1
        persistence:
          enabled: true
          storageClass: local-path
          size: 5Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
      read:
        replicas: 0
      write:
        replicas: 0
      backend:
        replicas: 0
      # Caches off — single-node toy cluster.
      chunksCache:
        enabled: false
      resultsCache:
        enabled: false
      lokiCanary:
        enabled: false
      test:
        enabled: false
      monitoring:
        selfMonitoring:
          enabled: false
          grafanaAgent:
            installOperator: false
        lokiCanary:
          enabled: false
      gateway:
        enabled: true
        replicas: 1

- name: Install Loki (logs backend with 72h retention)
  ansible.builtin.shell: |
    helm upgrade --install loki grafana/loki \
      --namespace {{ monitoring_namespace }} \
      --version {{ loki_chart_version }} \
      -f /tmp/loki-values.yaml \
      --wait --timeout 10m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Render Promtail values (ship all pod logs into Loki)
  ansible.builtin.copy:
    dest: /tmp/promtail-values.yaml
    mode: "0600"
    content: |
      config:
        clients:
          - url: http://loki-gateway.{{ monitoring_namespace }}.svc.cluster.local/loki/api/v1/push
        snippets:
          # Parse Traefik JSON access log lines into Loki labels. Other
          # containers fall through to the default `cri` stage applied by
          # the chart itself, so we don't need to declare it here.
          extraRelabelConfigs: []
          pipelineStages:
            - cri: {}
            - match:
                selector: '{container="traefik"}'
                stages:
                  - json:
                      expressions:
                        request_method: RequestMethod
                        request_path: RequestPath
                        downstream_status: DownstreamStatus
                        duration_ms: Duration
                        router_name: RouterName
                        service_name: ServiceName
                  - labels:
                      router_name:
                      service_name:
                      downstream_status:
      serviceMonitor:
        enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

- name: Install Promtail (log shipper)
  ansible.builtin.shell: |
    helm upgrade --install promtail grafana/promtail \
      --namespace {{ monitoring_namespace }} \
      --version {{ promtail_chart_version }} \
      -f /tmp/promtail-values.yaml \
      --wait --timeout 10m
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Clean up rendered monitoring values
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/kube-prometheus-stack-values.yaml
    - /tmp/loki-values.yaml
    - /tmp/promtail-values.yaml
