# Local development overrides — applied on top of charts/fleetros/values.yaml
global:
  domain: fleetros.local
  tlsIssuer: fleetros-issuer

data:
  postgres:
    persistence:
      size: 5Gi   # smaller for laptop
    cpu: "250m"
    memory: "512Mi"
  keycloak:
    persistence:
      size: 1Gi
    publicHostname: auth.fleetros.local   # https://auth.fleetros.local
    ingress:
      enabled: true
    realmImport:
      enabled: true

argocd:
  ingress:
    enabled: true
    host: argocd        # https://argocd.fleetros.local

stackgres:
  ingress:
    enabled: true
    host: stackgres     # https://stackgres.fleetros.local

traefik:
  ingress:
    enabled: true
    host: traefik       # https://traefik.fleetros.local

monitoring:
  ingress:
    enabled: true
    host: grafana       # https://grafana.fleetros.local

platform:
  domain: fleetros.local
  mailpit:
    enabled: true
    ingressHost: mail   # https://mail.fleetros.local for the web UI
  defaults:
    replicas: 1
    # Local always uses the floating `:latest` tag, so force a fresh registry
    # pull on every pod restart. Without `Always`, `IfNotPresent` makes
    # `kubectl rollout restart` run the cached old image — pods come up green
    # but with stale code.
    imagePullPolicy: Always
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
    # Defaults applied to every service. Per-service `env` blocks merge on top.
    env:
      SPRING_DATA_REDIS_HOST: redis.data.svc.cluster.local
      SPRING_DATA_REDIS_PORT: "6379"
      KEYCLOAK_URL: http://keycloak.data.svc.cluster.local:8080
      SPRING_MAIL_HOST: mailpit.app.svc.cluster.local
      SPRING_MAIL_PORT: "1025"
  services:
    backoffice:
      enabled: true
      image: so0n/car-rental-backoffice-service
      tag: "latest"     # local: floating dev tag allowed
      port: 8082
      ingressHost: api
      # Owns the canonical schema (accounts, users, ...). Must roll out first.
      syncWave: "1"
      resources:
        requests: { cpu: 100m, memory: 512Mi }
        limits:   { cpu: "1",  memory: 1536Mi }
      # Persist uploaded vehicle/booking/offering images across pod restarts.
      # Without this, /app/uploads is ephemeral and every restart wipes
      # customer-uploaded media (the URLs stored in DB then 404).
      persistence:
        enabled: true
        name: uploads
        mountPath: /app/uploads
        size: 5Gi
        accessMode: ReadWriteOnce
        storageClass: local-path
      env:
        SPRING_PROFILES_ACTIVE: dev
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/backoffice
        PRICING_SERVICE_BASE_URL: http://pricing.app.svc.cluster.local:8081
        PAYMENT_PLATFORM_URL: http://payment.app.svc.cluster.local:8085
        ONBOARDING_SERVICE_BASE_URL: http://onboarding.app.svc.cluster.local:8083
        # Browser CORS: dashboard at app.fleetros.local calls api.fleetros.local.
        # `cors.allowed-origins` in application-dev.yml does NOT include the
        # ingress host, so without this override Spring Security 403s the
        # OPTIONS preflight for /api/registration/master-account etc.
        CORS_ALLOWED_ORIGINS: "https://*.fleetros.local,http://localhost:3000"
        FILE_STORAGE_LOCAL_BASE_URL: https://api.fleetros.local/api/files
    payment:
      enabled: true
      image: so0n/car-rental-payment-service
      tag: "latest"
      port: 8085
      env:
        SPRING_PROFILES_ACTIVE: dev
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/payment_platform
    onboarding:
      enabled: true
      image: so0n/car-rental-onboarding-service
      tag: "latest"
      port: 8083
      env:
        SPRING_PROFILES_ACTIVE: dev
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/payment_platform
    pricing:
      enabled: true
      image: so0n/car-rental-rental-pricing-service
      tag: "latest"
      port: 8081
      env:
        SPRING_PROFILES_ACTIVE: dev
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/backoffice
    reporting:
      enabled: true
      image: so0n/car-rental-reporting-service
      ingressHost: reporting   # https://reporting.fleetros.local
       # Start AFTER backoffice has had a chance to create canonical schema.
       # Reporting's local Account/User entities map to a singular `account`
       # table that conflicts with backoffice's `accounts`. We force ddl-auto=none
       # so reporting cannot pollute the shared schema. Sync wave is belt-and-
       # suspenders so on a fresh cluster Argo orders backoffice first.
      tag: "latest"
      port: 8084
      # Start AFTER backoffice has had a chance to create canonical schema.
      # Reporting's local Account/User entities map to a singular `account`
      # table that conflicts with backoffice's `accounts`. We force ddl-auto=none
      # so reporting cannot pollute the shared schema. Sync wave is belt-and-
      # suspenders so on a fresh cluster Argo orders backoffice first.
      syncWave: "3"
      env:
        SPRING_PROFILES_ACTIVE: dev
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/backoffice
        # DO NOT change to update/create — see comment above.
        SPRING_JPA_HIBERNATE_DDL_AUTO: none
        SPRING_JPA_PROPERTIES_HIBERNATE_HBM2DDL_AUTO: none
        BACKOFFICE_SERVICE_BASE_URL: http://backoffice.app.svc.cluster.local:8082
        # Browser CORS: dashboard hits reporting.fleetros.local directly.
        CORS_ALLOWED_ORIGINS: "https://*.fleetros.local,http://localhost:3000"
    customerportal:
      enabled: true
      image: so0n/car-rental-customer-portal-service
      tag: "latest"
      port: 8086
      # Backend API for the customer-portal frontend. portal.fleetros.local is
      # taken by the Next.js portal UI; expose this on a different subdomain.
      ingressHost: customer-api
      env:
        SPRING_PROFILES_ACTIVE: docker
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.data.svc.cluster.local:5432/backoffice
        CUSTOMER_KEYCLOAK_URL: http://keycloak.data.svc.cluster.local:8080
        CUSTOMER_KEYCLOAK_REALM: carrental-customers
        CUSTOMER_KEYCLOAK_CLIENT_ID: customer-portal-client
        CUSTOMER_KEYCLOAK_CLIENT_SECRET: change-me
        CUSTOMER_KEYCLOAK_ADMIN_USER: admin
        CUSTOMER_KEYCLOAK_ADMIN_PASSWORD: admin
        SERVER_PORT: "8086"
        # Browser CORS: portal/app call customer-api.fleetros.local.
        CUSTOMER_PORTAL_CORS_ALLOWED_ORIGINS: "https://*.fleetros.local,http://localhost:3000"
    notification:
      enabled: true
      image: so0n/car-rental-notification-service
      tag: "latest"
      port: 8087   # default 8086 collides with customerportal; override via SERVER_PORT
      env:
        SPRING_PROFILES_ACTIVE: docker
        SERVER_PORT: "8087"
        # Stateless (no DB). Uses Redis + Mailpit + Firebase (dry-run).
        EMAIL_ENABLED: "true"
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
        NOTIFICATION_FIREBASE_ENABLED: "true"
        NOTIFICATION_FIREBASE_CREDENTIALS_FILE: "classpath:firebase/firebase-service-account-sandbox.json"
        NOTIFICATION_FIREBASE_PROJECT_ID: "fleetros-sandbox"
        NOTIFICATION_ANDROID_ENABLED: "true"
        NOTIFICATION_ANDROID_DRY_RUN: "true"
        NOTIFICATION_IOS_ENABLED: "true"
        NOTIFICATION_IOS_DRY_RUN: "true"

web:
  enabled: true
  image: so0n/car-rental-backoffice-dashboard
  tag: "latest"
  port: 3000
  domain: fleetros.local
  ingressHost: app     # https://app.fleetros.local (dashboard mode)
  extraHosts: []       # portal.fleetros.local is owned by the `customer` subchart (fleetros-website-builder)
  env:
    NEXT_PUBLIC_APP_URL: "https://app.fleetros.local"
    NEXT_PUBLIC_PRIMARY_HOSTS: "app.fleetros.local"
    NEXT_PUBLIC_BRAND_NAME: "Fleetros"
    NEXT_PUBLIC_I18N_DEFAULT_LOCALE: "en"
    # Public (browser) URLs go through ingress
    NEXT_PUBLIC_API_BASE_URL: "https://api.fleetros.local"
    NEXT_PUBLIC_API_URL: "https://api.fleetros.local"
    NEXT_PUBLIC_REPORTING_API_URL: "https://reporting.fleetros.local"
    # Backoffice sidebar "Customer App" link → tenant website builder UI
    # (Next.js, served by the `customer` subchart). NOT customer-api, which is
    # the Spring backend for end-customer (tenant-of-tenant) login.
    NEXT_PUBLIC_SITE_EDITOR_URL: "https://portal.fleetros.local"
    NEXT_PUBLIC_ENABLE_ONBOARDING: "true"
    NEXT_PUBLIC_ENABLE_NOTIFICATIONS: "true"
    NEXT_PUBLIC_ENABLE_COMMAND_PALETTE: "true"
    # Server-side (in-cluster) URLs hit services directly
    NEXTAUTH_URL: "https://app.fleetros.local"
    BACKEND_API_URL: "http://backoffice.app.svc.cluster.local:8082"
    BACKEND_USERINFO_ENDPOINT: "http://backoffice.app.svc.cluster.local:8082/api/auth/me"
    # Keycloak OAuth (browser-facing endpoints; replace realm/client when known)
    KEYCLOAK_ISSUER: "https://auth.fleetros.local/realms/backoffice"
    KEYCLOAK_CLIENT_ID: "backoffice-client"
    KEYCLOAK_CLIENT_SECRET: "kypYMXtLSCxDjw8D6kNUSTwWigJEkqiF"
    AUTH_REDIRECT_URI: "https://api.fleetros.local/api/auth/callback"
    AUTH_POST_LOGOUT_REDIRECT_URI: "https://app.fleetros.local/login"
    # Browser-facing endpoints (must be a hostname the user's browser can resolve)
    KEYCLOAK_AUTHORIZATION_ENDPOINT: "https://auth.fleetros.local/realms/backoffice/protocol/openid-connect/auth"
    KEYCLOAK_END_SESSION_ENDPOINT: "https://auth.fleetros.local/realms/backoffice/protocol/openid-connect/logout"
    # Server-side endpoints (called from the Next.js pod -> in-cluster service DNS)
    KEYCLOAK_TOKEN_ENDPOINT: "http://keycloak.data.svc.cluster.local:8080/realms/backoffice/protocol/openid-connect/token"
    KEYCLOAK_USERINFO_ENDPOINT: "http://keycloak.data.svc.cluster.local:8080/realms/backoffice/protocol/openid-connect/userinfo"
    KEYCLOAK_JWKS_ENDPOINT: "http://keycloak.data.svc.cluster.local:8080/realms/backoffice/protocol/openid-connect/certs"
    OAUTH_CALLBACK_URL: "https://app.fleetros.local/api/auth/callback/keycloak"
    SESSION_SECRET: "complex_password_at_least_32_characters_long_for_local_dev_only"
    CORS_ALLOWED_ORIGINS: "https://*.fleetros.local"
    # Share the iron-session cookie across *.fleetros.local so that after
    # logging in at app.fleetros.local the same cookie is sent to
    # portal.fleetros.local (website-builder middleware /api/auth/me check).
    SESSION_COOKIE_DOMAIN: ".fleetros.local"
    # End-customer portal (Spring customer-portal-service) — browser-facing.
    # Used by the /portal/* routes inside backoffice-v2 to call the OTP /
    # bookings APIs. Must be the public ingress host because this is read
    # client-side.
    NEXT_PUBLIC_PORTAL_API_BASE_URL: "https://customer-api.fleetros.local"

customer:
  # Tenant-facing website builder (Next.js, fleetros-website-builder repo).
  # Two roles, distinguished by hostname:
  #   * portal.fleetros.local           → admin / site-builder dashboard.
  #     Tenants land here when they click "Customer App" in the backoffice
  #     sidebar (NEXT_PUBLIC_SITE_EDITOR_URL above).
  #   * <tenant>.portal.fleetros.local  → published static site for that
  #     tenant (rewritten by the Next.js middleware to /sites/<tenant>/...).
  #
  # NOTE: the *end-customer* (tenant's customers) login flow is owned by the
  # `customerportal` Spring service exposed at https://customer-api.fleetros.local.
  # Don't confuse the two.
  enabled: true
  image: so0n/fleetros-website-builder
  tag: "latest"
  port: 3001
  domain: fleetros.local
  ingressHost: portal      # https://portal.fleetros.local
  extraHosts: []
  db:
    host: postgres.data.svc.cluster.local
    port: "5432"
    name: website
    credsSecret: postgres-creds
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  env:
    # Public app URL (used for absolute links / SSR self-references)
    PUBLIC_BASE_URL: "https://portal.fleetros.local"
    # Tenant subdomain routing: middleware treats any host of the form
    # <tenant>.<BASE_DOMAIN> as a tenant site, and the bare BASE_DOMAIN as
    # the admin/builder root. Setting BASE_DOMAIN to the apex (fleetros.local)
    # would make middleware rewrite portal.fleetros.local/ to
    # /sites/portal/index.html → 404. Use the portal host as the base.
    NEXT_PUBLIC_BASE_DOMAIN: "portal.fleetros.local"
    BASE_DOMAIN: "portal.fleetros.local"
    NEXT_PUBLIC_AUTH_HOST: "https://app.fleetros.local"
    NEXT_PUBLIC_AUTH_PORT: "443"
    NEXT_PUBLIC_RENTAL_API_HOST: "https://api.fleetros.local"
    NEXT_PUBLIC_RENTAL_API_PORT: "443"
    NEXT_PUBLIC_RECEIPT_API_PORT: 
    NEXT_PUBLIC_RECEIPT_API_HOST: "https://app.fleetros.local"
    NEXT_PUBLIC_USE_SAMPLE_DATA: "false"
    NEXT_PUBLIC_MAX_CARS_SELECTABLE: "5"
    # Auth service (server-side; in-cluster DNS to the backoffice Next.js for
    # /api/auth/me — this endpoint is implemented by fleetros-web, NOT the
    # Spring backoffice service). The cookie forwarded here is the iron-session
    # cookie shared via SESSION_COOKIE_DOMAIN=.fleetros.local.
    AUTH_SERVICE_URL: "http://fleetros-web.app.svc.cluster.local:3000"
    AUTH_REDIRECT_URL: "https://app.fleetros.local"
    # Customer portal login URL pattern (browser-facing)
    CUSTOMER_PORTAL_BASE_URL: "https://portal.fleetros.local"
    ADMIN_ROLE: "ROLE_SYSTEM_ADMIN"
    # Storage (filesystem inside the pod by default)
    STORAGE_PROVIDER: "filesystem"

