# Production overrides — applied on top of charts/fleetros/values.yaml
global:
  domain: fleetros.example
  tlsIssuer: fleetros-issuer    # LE DNS-01 in prod (configured by Ansible)

data:
  postgres:
    persistence:
      size: 50Gi
    # Daily off-site base backup + WAL archiving. Sliding 7-day retention
    # window: the newest snapshot replaces the oldest automatically, no
    # ops action required in the StackGres UI.
    backups:
      enabled: true
      cronSchedule: "0 2 * * *"   # daily at 02:00 UTC
      retention: 7
      compression: lz4
      objectStorage:
        type: s3Compatible
        # Bucket + endpoint MUST be set per-environment (e.g. via Ansible
        # vault override) before enabling. Credentials live in the
        # `stackgres-backup-creds` Secret in the `data` namespace.
        bucket: ${STACKGRES_BACKUP_BUCKET}
        region: ${STACKGRES_BACKUP_REGION}
        endpoint: ${STACKGRES_BACKUP_ENDPOINT}
        enablePathStyleAddressing: true
        credentialsSecretName: stackgres-backup-creds
        accessKeyIdKey: accessKeyId
        secretAccessKeyKey: secretAccessKey
  redis:
    persistence:
      size: 5Gi
  keycloak:
    persistence:
      size: 5Gi

platform:
  domain: fleetros.example
  defaults:
    replicas: 1
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1500m, memory: 1536Mi }
    # Production autoscaling: floor at 2 (HA), ceiling at 6. Threshold
    # remains 75% so a pod is replaced before it saturates. Tune per
    # service via `$svc.autoscaling.{minReplicas,maxReplicas,...}` below.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: 75
  # Tags below are pinned semver — Argo CD Image Updater rewrites them via the regexp ^v\d+\.\d+\.\d+$
  services:
    backoffice:
      enabled: true
      image: so0n/car-rental-backoffice-service
      tag: v0.1.0
      port: 8082
      ingressHost: api
      env:
        SPRING_PROFILES_ACTIVE: prod
        # Public origin used to render absolute URLs in outbound emails
        # (booking confirmations, payment receipts, magic links). Without
        # this, emailed links point at the application-prod default
        # placeholder host.
        FRONTEND_URL: https://app.fleetros.example
      # Persist vehicle/booking/offering image uploads across pod restarts.
      persistence:
        enabled: true
        name: uploads
        mountPath: /app/uploads
        size: 50Gi
        accessMode: ReadWriteOnce
    payment:           { enabled: true, image: so0n/car-rental-payment-service,           tag: v0.1.0, port: 8085, env: { SPRING_PROFILES_ACTIVE: prod } }
    onboarding:        { enabled: true, image: so0n/car-rental-onboarding-service,        tag: v0.1.0, port: 8083, env: { SPRING_PROFILES_ACTIVE: prod } }
    pricing:           { enabled: true, image: so0n/car-rental-rental-pricing-service,    tag: v0.1.0, port: 8081, env: { SPRING_PROFILES_ACTIVE: prod } }
    reporting:         { enabled: true, image: so0n/car-rental-reporting-service,         tag: v0.1.0, port: 8084, env: { SPRING_PROFILES_ACTIVE: prod } }
    customerportal:    { enabled: true, image: so0n/car-rental-customer-portal-service,   tag: v0.1.0, port: 8086, ingressHost: portal, env: { SPRING_PROFILES_ACTIVE: prod } }
    notification:      { enabled: true, image: so0n/car-rental-notification-service,      tag: v0.1.0, port: 8086 }

web:
  domain: fleetros.example
  tag: v0.1.0
  ingressHost: app
  env:
    NEXT_PUBLIC_API_BASE_URL: "https://api.fleetros.example"
    NEXTAUTH_URL: "https://app.fleetros.example"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75

customer:
  domain: fleetros.example
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75

monitoring:
  alerting:
    # Production: set the URL via a vault-encrypted overlay (e.g.
    # group_vars/prod/vault.yml → fleetros_slack_webhook_url) and render
    # this file through Ansible before Argo CD pulls it. Leaving the URL
    # blank keeps alerting disabled until ops opts in.
    enabled: false
    slack:
      webhookUrl: ""   # injected from vault by `make tofu-inventory`-style overlay
      defaultChannel: "#fleetros-prod-alerts"
    # Per-category channel routing for prod.
    channels:
      podResources:    "#fleetros-prod-pods"
      serverResources: "#fleetros-prod-infra"
      serverDisk:      "#fleetros-prod-infra"
      pvcDisk:         "#fleetros-prod-infra"
      appLatency:      "#fleetros-prod-latency"
      traefikLatency:  "#fleetros-prod-latency"
      errorRate:       "#fleetros-prod-errors"
      appHealth:       "#fleetros-prod-health"
      watchdog:        "#fleetros-prod-watchdog"
