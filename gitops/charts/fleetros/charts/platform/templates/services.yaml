{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- if and $svc.persistence $svc.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-{{ $svc.persistence.name | default "uploads" }}
  namespace: {{ $.Values.namespace }}
spec:
  accessModes:
    - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
  {{- with $svc.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $svc.persistence.size | default "5Gi" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    # Picked up by the PodMonitor in the `monitoring` subchart so kube-prometheus-stack
    # scrapes /actuator/prometheus on every Spring Boot backend pod.
    app.kubernetes.io/component: backend
  annotations:
    argocd.argoproj.io/sync-wave: {{ $svc.syncWave | default "2" | quote }}
spec:
  replicas: {{ $svc.replicas | default $.Values.defaults.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image }}:{{ $svc.tag }}"
          imagePullPolicy: {{ $.Values.defaults.imagePullPolicy }}
          ports:
            # Named so the PodMonitor can reference it by `port: http`.
            - name: http
              containerPort: {{ $svc.port }}
          env:
            {{- range $k, $v := $.Values.defaults.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range $k, $v := ($svc.env | default dict) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_PASSWORD }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_USER }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_PASSWORD }
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            {{- toYaml ($svc.resources | default $.Values.defaults.resources) | nindent 12 }}
          {{- if and $svc.persistence $svc.persistence.enabled }}
          volumeMounts:
            - name: {{ $svc.persistence.name | default "uploads" }}
              mountPath: {{ $svc.persistence.mountPath | default "/app/uploads" }}
          {{- end }}
          startupProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 30
            failureThreshold: 3
      {{- if and $svc.persistence $svc.persistence.enabled }}
      volumes:
        - name: {{ $svc.persistence.name | default "uploads" }}
          persistentVolumeClaim:
            claimName: {{ $name }}-{{ $svc.persistence.name | default "uploads" }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- if $svc.ingressHost }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $.Values.tlsIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: {{ $.Values.ingressClassName }}
  tls:
    - hosts: ["{{ $svc.ingressHost }}.{{ $.Values.domain }}"]
      secretName: {{ $name }}-tls
  rules:
    - host: "{{ $svc.ingressHost }}.{{ $.Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
{{- end }}
{{- end }}
{{- end }}
