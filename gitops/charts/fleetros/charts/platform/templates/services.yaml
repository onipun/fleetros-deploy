{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- if and $svc.persistence $svc.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-{{ $svc.persistence.name | default "uploads" }}
  namespace: {{ $.Values.namespace }}
  annotations:
    # Same sync-wave as the Deployment below. With WaitForFirstConsumer
    # storage classes (e.g. k3s local-path), a PVC stays Pending until a
    # pod schedules — so if Argo CD applies the PVC in an earlier wave it
    # blocks forever waiting for the volume to become Bound, and the
    # Deployment that would trigger the binding is never created. Pinning
    # the PVC to the same wave as the Deployment lets `kubectl apply`
    # create both together so the new pod schedules and binds the PVC.
    argocd.argoproj.io/sync-wave: {{ $svc.syncWave | default "2" | quote }}
spec:
  accessModes:
    - {{ $svc.persistence.accessMode | default "ReadWriteOnce" }}
  {{- with $svc.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $svc.persistence.size | default "5Gi" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    # Picked up by the PodMonitor in the `monitoring` subchart so kube-prometheus-stack
    # scrapes /actuator/prometheus on every Spring Boot backend pod.
    app.kubernetes.io/component: backend
  annotations:
    argocd.argoproj.io/sync-wave: {{ $svc.syncWave | default "2" | quote }}
spec:
  {{- /*
    When the HPA is enabled we intentionally omit `spec.replicas` so the
    autoscaler owns it; otherwise every chart apply would reset the live
    replica count and fight the HPA. Falls back to a fixed replicas when
    autoscaling is opted out per-service.
  */ -}}
  {{- $hpa := merge (dict) ($svc.autoscaling | default dict) ($.Values.defaults.autoscaling | default dict) }}
  {{- if not $hpa.enabled }}
  replicas: {{ $svc.replicas | default $.Values.defaults.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        app.kubernetes.io/component: backend
      {{- if $.Values.logging.enabled }}
      annotations:
        # Roll pods when the shared logback config changes.
        checksum/logback-config: {{ include (print $.Template.BasePath "/logging-configmap.yaml") $ | sha256sum }}
      {{- end }}
    spec:
      {{- if $.Values.logging.enabled }}
      # hostPath volumes are created root-owned 0755; Spring Boot pods run
      # as a non-root user (e.g. UID 100 in spring/openjdk images) and
      # cannot create the daily subdirectories. Fix perms once on pod
      # start so Logback's TimeBasedRollingPolicy can write its files.
      initContainers:
        - name: fix-log-perms
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p {{ $.Values.logging.containerPath | default "/var/log/fleetros" }}
              # Recursive: date subdirectories may have been created earlier
              # by pods running under a different non-root UID (image authors
              # pick different users \u2014 spring uid 100, cnb uid 1000, etc.),
              # which would otherwise block writes from the new pod.
              chmod -R 0777 {{ $.Values.logging.containerPath | default "/var/log/fleetros" }}
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-logs
              mountPath: {{ $.Values.logging.containerPath | default "/var/log/fleetros" }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image }}:{{ $svc.tag }}"
          imagePullPolicy: {{ $.Values.defaults.imagePullPolicy }}
          ports:
            # Named so the PodMonitor can reference it by `port: http`.
            - name: http
              containerPort: {{ $svc.port }}
          env:
            {{- range $k, $v := $.Values.defaults.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range $k, $v := ($svc.env | default dict) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if $.Values.logging.enabled }}
            # Centralised logging — point Spring Boot at the shared logback
            # config mounted from the spring-logback-config ConfigMap.
            # Disable per service by setting `logging.enabled: false` under
            # platform values, or override APP_NAME/LOG_LEVEL via $svc.env.
            - name: LOGGING_CONFIG
              value: "file:/etc/fleetros/logback-spring.xml"
            - name: APP_NAME
              value: {{ $name | quote }}
            - name: LOG_DIR
              value: {{ $.Values.logging.containerPath | default "/var/log/fleetros" | quote }}
            - name: LOG_LEVEL
              value: {{ $.Values.logging.level | default "ERROR" | quote }}
            # Spring Boot binds LOGGING_LEVEL_ROOT \u2192 logging.level.root with
            # higher precedence than application.yml. Without this, per-app
            # `logging.level.*` properties in src/main/resources/application.yml
            # would override the root level set in logback-spring.xml and we'd
            # still see INFO/DEBUG lines on disk.
            - name: LOGGING_LEVEL_ROOT
              value: {{ $.Values.logging.level | default "ERROR" | quote }}
            - name: LOG_RETENTION_DAYS
              value: {{ $.Values.logging.retentionDays | default 7 | quote }}
            {{- end }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_PASSWORD }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_USER }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: postgres-creds, key: POSTGRES_PASSWORD }
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            {{- toYaml ($svc.resources | default $.Values.defaults.resources) | nindent 12 }}
          {{- if or (and $svc.persistence $svc.persistence.enabled) $.Values.logging.enabled }}
          volumeMounts:
            {{- if and $svc.persistence $svc.persistence.enabled }}
            - name: {{ $svc.persistence.name | default "uploads" }}
              mountPath: {{ $svc.persistence.mountPath | default "/app/uploads" }}
            {{- end }}
            {{- if $.Values.logging.enabled }}
            - name: logback-config
              mountPath: /etc/fleetros
              readOnly: true
            - name: app-logs
              mountPath: {{ $.Values.logging.containerPath | default "/var/log/fleetros" }}
            {{- end }}
          {{- end }}
          startupProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            periodSeconds: 30
            failureThreshold: 3
      {{- if or (and $svc.persistence $svc.persistence.enabled) $.Values.logging.enabled }}
      volumes:
        {{- if and $svc.persistence $svc.persistence.enabled }}
        - name: {{ $svc.persistence.name | default "uploads" }}
          persistentVolumeClaim:
            claimName: {{ $name }}-{{ $svc.persistence.name | default "uploads" }}
        {{- end }}
        {{- if $.Values.logging.enabled }}
        # Shared logback config — ROOT level ERROR, daily dir rotation,
        # N-day retention. See templates/logging-configmap.yaml.
        - name: logback-config
          configMap:
            name: spring-logback-config
        # Logs persist on the node so they survive pod restarts and you can
        # query them by SSHing into the host (single-node assumption — for
        # multi-node clusters swap this for an RWX PVC).
        - name: app-logs
          hostPath:
            path: {{ $.Values.logging.hostPath | default "/var/log/fleetros" }}
            type: DirectoryOrCreate
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- if $svc.ingressHost }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $.Values.tlsIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: {{ $.Values.ingressClassName }}
  tls:
    - hosts: ["{{ $svc.ingressHost }}.{{ $.Values.domain }}"]
      secretName: {{ $name }}-tls
  rules:
    - host: "{{ $svc.ingressHost }}.{{ $.Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
{{- end }}
{{- $hpa := merge (dict) ($svc.autoscaling | default dict) ($.Values.defaults.autoscaling | default dict) }}
{{- if $hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $svc.syncWave | default "2" | quote }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $hpa.minReplicas | default 1 }}
  maxReplicas: {{ $hpa.maxReplicas | default 3 }}
  metrics:
    {{- if $hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $hpa.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with $hpa.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
