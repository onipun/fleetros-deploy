{{- if and .Values.enabled .Values.springApps.podMonitor.enabled }}
# Scrapes Micrometer/Prometheus metrics from every Spring Boot backend pod.
# The platform subchart labels each pod `app.kubernetes.io/component: backend`
# and names the container port `http` (which is the same port that exposes
# Spring's /actuator/prometheus endpoint by default).
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: fleetros-spring-apps
  namespace: {{ .Values.namespace }}
  labels:
    # kube-prometheus-stack only selects monitors with this release label
    # (see `prometheus.prometheusSpec.podMonitorSelector` defaults).
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.springApps.podMonitor.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  podMetricsEndpoints:
    - port: http
      path: {{ .Values.springApps.podMonitor.path | quote }}
      interval: {{ .Values.springApps.podMonitor.interval }}
      scrapeTimeout: {{ .Values.springApps.podMonitor.scrapeTimeout }}
      # Keep the pod name as `instance` so panels can identify replicas.
      # The Prometheus operator fills in defaults (`action: replace`,
      # `separator: ;`, `regex: (.*)`, `replacement: $1`) on the live object,
      # so we declare them explicitly here to keep Argo's diff clean.
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_label_app]
          separator: ";"
          regex: "(.*)"
          targetLabel: app
          replacement: "$1"
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          separator: ";"
          regex: "(.*)"
          targetLabel: instance
          replacement: "$1"
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          separator: ";"
          regex: "(.*)"
          targetLabel: namespace
          replacement: "$1"
{{- end }}
