enabled: true
namespace: app
domain: fleetros.local
tlsIssuer: fleetros-issuer
ingressClassName: traefik

image: so0n/fleetros-website-builder
tag: "latest"
# IfNotPresent so a locally-imported image (e.g. via `make local-build-customer`)
# is not silently overwritten by a pull from Docker Hub on pod restart.
imagePullPolicy: IfNotPresent
port: 3001
replicas: 1
ingressHost: portal   # https://portal.fleetros.local
extraHosts: []        # additional subdomain prefixes routed to the same service

# When true, also route `*.{ingressHost}.{domain}` (e.g. `tripz-car-rental.portal.fleetros.local`)
# to the same Service so published tenant sites resolve. Requires the TLS
# issuer to support wildcard SANs (the local CA-based fleetros-issuer does;
# in prod use a DNS-01 ACME issuer).
wildcardSubdomain: true

# Database (StackGres-managed Postgres in the `data` namespace).
# Credentials come from the Ansible-seeded `postgres-creds` Secret which is
# only present in the `data` namespace, so we replicate it into `app` via the
# platform chart's existing pattern (see platform/templates/services.yaml).
db:
  host: postgres.data.svc.cluster.local
  port: "5432"
  name: website
  credsSecret: postgres-creds
  userKey: POSTGRES_USER
  passwordKey: POSTGRES_PASSWORD

env: {}

# Persistent storage for published tenant sites. The website-builder writes
# rendered output to `<mountPath>/<slug>` when a tenant clicks "Publish";
# without a writable volume the container hits EACCES because /app/public is
# part of the read-only Next.js image layer.
persistence:
  enabled: true
  mountPath: /app/public/sites
  size: 5Gi
  accessModes:
    - ReadWriteOnce
  # Empty string -> use cluster default. local: local-path (k3s), prod: see env override.
  storageClass: ""

# Next.js official image runs as uid/gid 1001 (`nextjs:nodejs`). fsGroup makes
# the mounted volume group-writable by that gid so mkdir succeeds.
podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch

