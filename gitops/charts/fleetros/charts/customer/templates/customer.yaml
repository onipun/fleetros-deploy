{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
  labels:
    app: fleetros-customer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: fleetros-customer
  template:
    metadata:
      labels:
        app: fleetros-customer
    spec:
      containers:
        - name: customer
          image: "{{ .Values.image }}:{{ .Values.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              value: {{ .Values.port | quote }}
            {{- with .Values.db }}
            - name: DB_HOST
              value: {{ .host | quote }}
            - name: DB_PORT
              value: {{ .port | quote }}
            - name: DB_NAME
              value: {{ .name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .credsSecret }}
                  key: {{ .userKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .credsSecret }}
                  key: {{ .passwordKey }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: fleetros-customer
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tlsIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  tls:
    - hosts:
        - "{{ .Values.ingressHost }}.{{ .Values.domain }}"
        {{- range .Values.extraHosts }}
        - "{{ . }}.{{ $.Values.domain }}"
        {{- end }}
      secretName: fleetros-customer-tls
  rules:
    - host: "{{ .Values.ingressHost }}.{{ .Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetros-customer
                port:
                  number: {{ .Values.port }}
    {{- range .Values.extraHosts }}
    - host: "{{ . }}.{{ $.Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetros-customer
                port:
                  number: {{ $.Values.port }}
    {{- end }}
{{- end }}
