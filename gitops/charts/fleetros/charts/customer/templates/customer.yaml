{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
  labels:
    app: fleetros-customer
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  {{- if not (and .Values.autoscaling .Values.autoscaling.enabled) }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: fleetros-customer
  template:
    metadata:
      labels:
        app: fleetros-customer
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: customer
          image: "{{ .Values.image }}:{{ .Values.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              value: {{ .Values.port | quote }}
            {{- with .Values.db }}
            - name: DB_HOST
              value: {{ .host | quote }}
            - name: DB_PORT
              value: {{ .port | quote }}
            - name: DB_NAME
              value: {{ .name | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .credsSecret }}
                  key: {{ .userKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .credsSecret }}
                  key: {{ .passwordKey }}
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: sites
              mountPath: {{ .Values.persistence.mountPath | quote }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: fleetros-customer-sites
      {{- end }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fleetros-customer-sites
  namespace: {{ .Values.namespace }}
  annotations:
    # Same wave as the Deployment: with WaitForFirstConsumer storage classes
    # (e.g. k3s local-path) the PVC stays Pending until a pod schedules, so
    # we must let Argo CD apply both together — otherwise the sync deadlocks
    # waiting for the PVC to become Bound.
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    {{- range .Values.persistence.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: fleetros-customer
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetros-customer
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tlsIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  tls:
    - hosts:
        - "{{ .Values.ingressHost }}.{{ .Values.domain }}"
        {{- if .Values.wildcardSubdomain }}
        - "*.{{ .Values.ingressHost }}.{{ .Values.domain }}"
        {{- end }}
        {{- range .Values.extraHosts }}
        - "{{ . }}.{{ $.Values.domain }}"
        {{- end }}
      secretName: fleetros-customer-tls
  rules:
    - host: "{{ .Values.ingressHost }}.{{ .Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetros-customer
                port:
                  number: {{ .Values.port }}
    {{- if .Values.wildcardSubdomain }}
    # Tenant subdomains published by the website-builder
    # (e.g. tripz-car-rental.portal.fleetros.local). Single Ingress rule
    # because Traefik supports wildcard hosts; backend is the same Service —
    # the app routes by Host header / first path segment.
    #
    # `/portal/*` and `/_next/*` are reverse-proxied to the fleetros-web
    # (Next.js dashboard) service so that the customer login flow renders
    # at `https://<tenant>.portal.fleetros.local/portal/login?tenant_id=…`
    # while the browser URL keeps the tenant subdomain. Traefik picks the
    # longest matching path, so the `/portal` and `/_next` rules win over
    # `/` for those prefixes. Other paths continue to serve the published
    # static site from fleetros-customer.
    - host: "*.{{ .Values.ingressHost }}.{{ .Values.domain }}"
      http:
        paths:
          {{- if .Values.portalProxy.enabled }}
          {{- range .Values.portalProxy.paths }}
          - path: {{ . | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.portalProxy.service }}
                port:
                  number: {{ $.Values.portalProxy.port }}
          {{- end }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetros-customer
                port:
                  number: {{ .Values.port }}
    {{- end }}
    {{- range .Values.extraHosts }}
    - host: "{{ . }}.{{ $.Values.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetros-customer
                port:
                  number: {{ $.Values.port }}
    {{- end }}
{{- end }}
