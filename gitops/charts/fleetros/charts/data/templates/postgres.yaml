{{- if .Values.postgres.enabled }}
# ----------------------------------------------------------------------------
# StackGres SGCluster — managed Postgres with built-in Patroni HA, pgBouncer,
# Prometheus exporters and Grafana dashboards. Replaces the previous raw
# StatefulSet.
#
# The cluster is named `postgres`, so the primary read/write Service stays at
# `postgres.data.svc.cluster.local:5432` and no application config has to
# change.
#
# Credentials are pulled from the Ansible-seeded `postgres-creds` Secret.
# Apps still read POSTGRES_USER/POSTGRES_PASSWORD from the same Secret, but
# StackGres reads its own keys (superuser-*, replication-*, authenticator-*).
# ----------------------------------------------------------------------------
apiVersion: stackgres.io/v1
kind: SGInstanceProfile
metadata:
  name: postgres-profile
  namespace: {{ .Values.namespace }}
spec:
  cpu: "{{ .Values.postgres.cpu | default "500m" }}"
  memory: "{{ .Values.postgres.memory | default "1Gi" }}"
---
apiVersion: stackgres.io/v1
kind: SGPostgresConfig
metadata:
  name: postgres-config
  namespace: {{ .Values.namespace }}
spec:
  postgresVersion: "{{ .Values.postgres.majorVersion | default 16 }}"
  postgresql.conf:
    shared_buffers: "256MB"
    max_connections: "200"
    # Slow-query observability: pg_stat_statements records the planning
    # and execution stats per normalised statement. The Grafana
    # "Postgres — slow queries" dashboard reads `pg_stat_statements_*`
    # metrics that StackGres' bundled exporter publishes when this
    # extension is preloaded and `track=all`.
    shared_preload_libraries: "pg_stat_statements"
    pg_stat_statements.track: "all"
    pg_stat_statements.max: "5000"
    # Mark statements running longer than 1s in pg_stat_activity so the
    # dashboard's "currently long-running" panel has something to chart.
    # Use the canonical unit ("1s") rather than a bare millisecond count
    # ("1000"); the StackGres operator normalises the value on the live
    # object, which would otherwise show as perpetual drift to Argo.
    log_min_duration_statement: "1s"
---
apiVersion: stackgres.io/v1
kind: SGPoolingConfig
metadata:
  name: postgres-pooling
  namespace: {{ .Values.namespace }}
spec:
  pgBouncer:
    pgbouncer.ini:
      pgbouncer:
        pool_mode: session
        max_client_conn: "1000"
        default_pool_size: "50"
---
{{- if .Values.postgres.databases }}
apiVersion: stackgres.io/v1
kind: SGScript
metadata:
  name: postgres-init
  namespace: {{ .Values.namespace }}
spec:
  continueOnError: true
  # Each entry MUST have a unique integer `id`. Without it StackGres assigns
  # -1 to every entry and rejects the resource with
  # `duplicate entries for key [id=-1]`. Numbering starts at 0; the matching
  # SGCluster.managedSql below references id=0 to mark the script applied.
  scripts:
{{- range $i, $db := .Values.postgres.databases }}
    - id: {{ $i }}
      name: create-{{ $db }}
      # CREATE DATABASE cannot run inside a transaction and `\gexec` is a
      # psql client meta-command (StackGres talks to Postgres directly via
      # JDBC, so backslash commands become syntax errors that
      # continueOnError silently swallows — leaving NO database created).
      #
      # We instead emit a bare `CREATE DATABASE` statement. On first run it
      # creates the DB. On subsequent reconciles Postgres returns
      # `database "<name>" already exists` (SQLSTATE 42P04) which
      # continueOnError logs and skips. Net effect: idempotent creation.
      script: |
        CREATE DATABASE "{{ $db }}";
{{- end }}
---
{{- end }}
apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: {{ .Values.postgres.instances | default 1 }}
  postgres:
    version: "{{ .Values.postgres.majorVersion | default 16 }}"
  sgInstanceProfile: postgres-profile
  configurations:
    sgPostgresConfig: postgres-config
    sgPoolingConfig: postgres-pooling
    {{- if and .Values.postgres.backups .Values.postgres.backups.enabled }}
    # Automated continuous archiving: a base backup at `cronSchedule` plus
    # WAL streaming in between, all written to the SGObjectStorage rendered
    # below. `retention` is a sliding window — once exceeded the oldest base
    # backup (and its associated WALs) is reaped automatically, so the
    # newest snapshot always replaces the oldest with zero manual work.
    backups:
      - sgObjectStorage: postgres-backups
        cronSchedule: {{ .Values.postgres.backups.cronSchedule | quote }}
        retention: {{ .Values.postgres.backups.retention }}
        compression: {{ .Values.postgres.backups.compression | default "lz4" }}
    {{- end }}
    credentials:
      users:
        superuser:
          username:
            name: postgres-creds
            key: superuser-username
          password:
            name: postgres-creds
            key: superuser-password
        replication:
          username:
            name: postgres-creds
            key: replication-username
          password:
            name: postgres-creds
            key: replication-password
        authenticator:
          username:
            name: postgres-creds
            key: authenticator-username
          password:
            name: postgres-creds
            key: authenticator-password
  pods:
    persistentVolume:
      size: {{ .Values.postgres.persistence.size | quote }}
{{- if .Values.global }}
{{- if .Values.global.storageClass }}
      storageClass: {{ .Values.global.storageClass | quote }}
{{- end }}
{{- end }}
  {{- if .Values.postgres.databases }}
  managedSql:
    # `id` is the slot index inside SGCluster's managed-sql tracking — pick
    # any unique non-negative integer per attached script. `sgScript` is the
    # SGScript resource name. The SGScript itself owns the id-per-entry
    # numbering above; the value here is unrelated to those.
    scripts:
      - id: 0
        sgScript: postgres-init
  {{- end }}
  prometheusAutobind: true
---
# Compatibility shim: existing apps and Keycloak hard-code
# `postgres.data.svc.cluster.local:5432`. StackGres exposes the read/write
# primary on a Service named exactly `postgres` (matching the SGCluster name),
# so no aliasing is required — but we keep this comment as documentation.
{{- if and .Values.postgres.backups .Values.postgres.backups.enabled }}
---
# SGObjectStorage backing the SGCluster's `configurations.backups` block.
# Credentials are pulled from an in-cluster Secret (Ansible-seeded) so the
# manifest itself is safe to commit. Swap `s3Compatible` for `s3` / `gcs` /
# `azureBlob` depending on provider — only one branch is rendered.
apiVersion: stackgres.io/v1beta1
kind: SGObjectStorage
metadata:
  name: postgres-backups
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: {{ .Values.postgres.backups.objectStorage.type | default "s3Compatible" }}
  {{- $os := .Values.postgres.backups.objectStorage }}
  {{- if eq ($os.type | default "s3Compatible") "s3Compatible" }}
  s3Compatible:
    bucket: {{ $os.bucket | quote }}
    {{- with $os.region }}
    region: {{ . | quote }}
    {{- end }}
    {{- with $os.endpoint }}
    endpoint: {{ . | quote }}
    {{- end }}
    enablePathStyleAddressing: {{ $os.enablePathStyleAddressing | default true }}
    awsCredentials:
      secretKeySelectors:
        accessKeyId:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.accessKeyIdKey | default "accessKeyId" | quote }}
        secretAccessKey:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.secretAccessKeyKey | default "secretAccessKey" | quote }}
  {{- else if eq $os.type "s3" }}
  s3:
    bucket: {{ $os.bucket | quote }}
    {{- with $os.region }}
    region: {{ . | quote }}
    {{- end }}
    awsCredentials:
      secretKeySelectors:
        accessKeyId:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.accessKeyIdKey | default "accessKeyId" | quote }}
        secretAccessKey:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.secretAccessKeyKey | default "secretAccessKey" | quote }}
  {{- else if eq $os.type "gcs" }}
  gcs:
    bucket: {{ $os.bucket | quote }}
    credentials:
      secretKeySelectors:
        serviceAccountJSON:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.serviceAccountJsonKey | default "serviceAccountJSON" | quote }}
  {{- else if eq $os.type "azureBlob" }}
  azureBlob:
    bucket: {{ $os.bucket | quote }}
    azureCredentials:
      secretKeySelectors:
        storageAccount:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.storageAccountKey | default "storageAccount" | quote }}
        accessKey:
          name: {{ $os.credentialsSecretName | quote }}
          key: {{ $os.accessKeyKey | default "accessKey" | quote }}
  {{- end }}
{{- end }}
{{- end }}
