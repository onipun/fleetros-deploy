{{- if .Values.keycloak.enabled }}
{{- if .Values.keycloak.realmImport.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: {{ .Values.namespace }}
data:
{{ (.Files.Glob "files/realms/*.json").AsConfig | indent 2 }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
  labels:
    app: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
      annotations:
        {{- if .Values.keycloak.realmImport.enabled }}
        # Roll the pod when realm JSON changes so Keycloak re-imports.
        checksum/realms: {{ (.Files.Glob "files/realms/*.json").AsConfig | sha256sum }}
        {{- end }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image }}:{{ .Values.keycloak.tag }}"
          args:
            - "start-dev"
            - "--features=token-exchange,admin-fine-grained-authz"
            {{- if .Values.keycloak.realmImport.enabled }}
            - "--import-realm"
            {{- end }}
          ports:
            - containerPort: {{ .Values.keycloak.port }}
          envFrom:
            - secretRef:
                name: keycloak-admin
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres.data.svc.cluster.local:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: POSTGRES_PASSWORD
            {{- if .Values.keycloak.publicHostname }}
            # Keycloak generates issuer/discovery URLs from this. It MUST be
            # reachable from the user's browser (not the in-cluster service DNS).
            # We set the absolute frontend URL (not just KC_HOSTNAME) so the
            # `iss` claim is always https://<host> — even when requests come in
            # over plain HTTP via the in-cluster Service (e.g. server-side
            # token refresh from the Next.js dashboard pod). Without this,
            # browser-issued tokens have iss=https://… but refresh calls
            # compute iss=http://… → invalid_grant.
            # NOTE: KC_HOSTNAME and KC_HOSTNAME_URL are mutually exclusive in
            # Keycloak 23 — pick one. KC_HOSTNAME_URL wins because it pins the
            # scheme too.
            - name: KC_HOSTNAME_URL
              value: {{ printf "https://%s" .Values.keycloak.publicHostname | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HOSTNAME_STRICT_BACKCHANNEL
              value: "false"
            - name: KC_PROXY
              value: "edge"
            {{- else }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            {{- end }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
          {{- if .Values.keycloak.realmImport.enabled }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: 180
            periodSeconds: 30
      {{- if .Values.keycloak.realmImport.enabled }}
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: keycloak
  ports:
    - port: {{ .Values.keycloak.port }}
      targetPort: {{ .Values.keycloak.port }}
{{- if and .Values.keycloak.ingress .Values.keycloak.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tlsIssuer | default "fleetros-issuer" }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: {{ .Values.ingressClassName | default "traefik" }}
  tls:
    - hosts: ["{{ .Values.keycloak.publicHostname }}"]
      secretName: keycloak-tls
  rules:
    - host: {{ .Values.keycloak.publicHostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: {{ .Values.keycloak.port }}
{{- end }}
{{- end }}
