enabled: true
namespace: data

# StackGres-managed PostgreSQL. The previous `image`/`tag`/`port` knobs are
# gone — StackGres pins Postgres images per supported major version, and the
# Service is always on 5432.
postgres:
  enabled: true
  majorVersion: 16
  instances: 1
  cpu: "500m"
  memory: "1Gi"
  persistence:
    size: 10Gi
  databases:
    - backoffice
    - keycloak
    - payment_platform
    - website

redis:
  enabled: true
  image: redis
  tag: "7-alpine"
  port: 6379
  persistence:
    size: 2Gi

keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak
  tag: "23.0"
  port: 8080
  persistence:
    size: 2Gi
  # Browser-facing hostname. When set, Keycloak generates issuer / OIDC URLs
  # using this host (so login redirects work). Leave empty to fall back to
  # KC_HOSTNAME_STRICT=false (in-cluster usage only).
  publicHostname: ""
  ingress:
    enabled: false
  realmImport:
    enabled: false
