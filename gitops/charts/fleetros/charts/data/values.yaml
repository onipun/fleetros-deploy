enabled: true
namespace: data

postgres:
  enabled: true
  image: postgres
  tag: "16-alpine"
  port: 5432
  persistence:
    size: 10Gi
  databases:
    - backoffice
    - keycloak
    - payment_platform
    - website

redis:
  enabled: true
  image: redis
  tag: "7-alpine"
  port: 6379
  persistence:
    size: 2Gi

keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak
  tag: "23.0"
  port: 8080
  persistence:
    size: 2Gi
