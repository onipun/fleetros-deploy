enabled: true
namespace: data

# StackGres-managed PostgreSQL. The previous `image`/`tag`/`port` knobs are
# gone — StackGres pins Postgres images per supported major version, and the
# Service is always on 5432.
postgres:
  enabled: true
  majorVersion: 16
  instances: 1
  cpu: "500m"
  memory: "1Gi"
  persistence:
    size: 10Gi
  databases:
    - backoffice
    - keycloak
    - payment_platform
    - website
  # Automated base backups + WAL archiving.
  #
  # When `enabled: true`, the chart renders an SGObjectStorage (using the
  # `objectStorage` config below) and wires it into SGCluster.spec.configurations.backups
  # so the operator runs a daily base backup on `cronSchedule` and prunes
  # everything older than `retention` base backups. The sliding window means
  # the newest backup always replaces the oldest — no manual cleanup, no
  # action required in the StackGres UI in production.
  backups:
    enabled: false
    cronSchedule: "0 2 * * *"   # daily at 02:00 UTC
    retention: 7                # keep the last 7 daily base backups
    compression: lz4
    # SGObjectStorage backend. Only one of s3Compatible / s3 / gcs / azureBlob
    # is consumed at a time. `s3Compatible` covers MinIO + most non-AWS
    # providers. The credentials Secret MUST exist in the same namespace as
    # the SGCluster (`data`); Ansible's bootstrap role seeds it.
    objectStorage:
      type: s3Compatible
      bucket: ""
      region: "us-east-1"
      endpoint: ""
      enablePathStyleAddressing: true
      credentialsSecretName: stackgres-backup-creds
      accessKeyIdKey: accessKeyId
      secretAccessKeyKey: secretAccessKey

redis:
  enabled: true
  image: redis
  tag: "7-alpine"
  port: 6379
  persistence:
    size: 2Gi

keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak
  tag: "23.0"
  port: 8080
  persistence:
    size: 2Gi
  # Browser-facing hostname. When set, Keycloak generates issuer / OIDC URLs
  # using this host (so login redirects work). Leave empty to fall back to
  # KC_HOSTNAME_STRICT=false (in-cluster usage only).
  publicHostname: ""
  ingress:
    enabled: false
  realmImport:
    enabled: false
