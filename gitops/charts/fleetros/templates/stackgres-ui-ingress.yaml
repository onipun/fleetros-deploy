{{- if .Values.stackgres.ingress.enabled }}
# StackGres Web UI ingress — same pattern as the Argo CD UI ingress.
#
# StackGres only exposes the UI over HTTPS (port 443) on the
# `stackgres-restapi` Service, with its own self-signed cert. We ask Traefik
# to talk HTTPS to that backend AND skip cert verification (the cert is
# generated by the operator on install and won't match our hostname). The
# `serversscheme` + `serverstransport` annotations are K3s/Traefik specific
# and rely on the `stackgres-insecure-transport` ServersTransport CR below.
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: stackgres-insecure-transport
  namespace: stackgres
spec:
  insecureSkipVerify: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackgres-ui
  namespace: stackgres
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.global.tlsIssuer | quote }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: "https"
    traefik.ingress.kubernetes.io/service.serverstransport: "stackgres-stackgres-insecure-transport@kubernetescrd"
spec:
  ingressClassName: {{ .Values.global.ingressClassName | default "traefik" }}
  rules:
    - host: {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackgres-restapi
                port:
                  number: {{ .Values.stackgres.ingress.servicePort | default 443 }}
  tls:
    - hosts:
        - {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      secretName: stackgres-ui-tls
{{- end }}

