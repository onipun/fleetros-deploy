{{- if .Values.stackgres.ingress.enabled }}
# StackGres Web UI ingress.
#
# The operator-managed `stackgres-restapi` Service only exposes the HTTPS
# port (443 -> container 9443) with the operator's self-signed cert.
# Traefik's Kubernetes Ingress provider doesn't reliably honor the
# `service.serverstransport` annotation in K3s' bundled Traefik v2.11,
# which leaves Traefik unable to skip backend cert verification and
# results in "Internal Server Error" (HTTP 500).
#
# Workaround: the same nginx pod also serves the UI on plain HTTP at
# container port 9080. We create an auxiliary Service that fronts that
# HTTP port using the same selector as `stackgres-restapi`, and route the
# Ingress to it. Edge TLS is still handled by Traefik via cert-manager.
apiVersion: v1
kind: Service
metadata:
  name: stackgres-ui-http
  namespace: stackgres
  labels:
    app.kubernetes.io/name: stackgres-ui-http
    app.kubernetes.io/part-of: stackgres
spec:
  type: ClusterIP
  selector:
    app: StackGresConfig
    stackgres.io/restapi: "true"
  ports:
    - name: http
      port: 80
      targetPort: 9080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackgres-ui
  namespace: stackgres
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.global.tlsIssuer | quote }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: {{ .Values.global.ingressClassName | default "traefik" }}
  rules:
    - host: {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackgres-ui-http
                port:
                  number: 80
  tls:
    - hosts:
        - {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      secretName: stackgres-ui-tls
{{- end }}

