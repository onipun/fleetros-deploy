{{- if .Values.stackgres.ingress.enabled }}
# StackGres Web UI ingress — same pattern as the Argo CD UI ingress.
# Backend: the `stackgres-restapi` Service in the `stackgres` namespace.
# It exposes an HTTP port (8080) when the operator was installed with
# `adminui.service.exposeHTTP.enabled=true` (see Ansible bootstrap role).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stackgres-ui
  namespace: stackgres
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.global.tlsIssuer | quote }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: {{ .Values.global.ingressClassName | default "traefik" }}
  rules:
    - host: {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stackgres-restapi
                port:
                  number: {{ .Values.stackgres.ingress.servicePort | default 8080 }}
  tls:
    - hosts:
        - {{ printf "%s.%s" .Values.stackgres.ingress.host .Values.global.domain | quote }}
      secretName: stackgres-ui-tls
{{- end }}
